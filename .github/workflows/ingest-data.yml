name: Ingest data to Oxigraph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Grep data
        run: |
          curl -L -o grep-data.zip https://data.udir.no/kl06/v201906/grep-data.zip
          unzip grep-data.zip -d grep-temp

      - name: Convert to N-Triples (using Oxigraph locally)
        run: |
          # Vi bruker Oxigraph-containeren til å slå sammen alle småfilene til én stor .nt-fil
          # Vi må først finne alle filene og lage en liste
          find grep-temp -name "*.jsonld" > file-list.txt
          
          # Vi "streamer" alle filene inn i én stor fil ved hjelp av enkel tekst-sammenslåing (siden JSON-LD er litt vrien å cat-e direkte, 
          # så bruker vi likevel en enkel konvertering per fil hvis nødvendig, men la oss prøve å sende dem direkte som en liste)
          
          # Ny taktikk: Vi bruker npx og et enkelt RDF-verktøy som alltid er tilgjengelig:
          npx -y rdf-cli serialize grep-temp/**/*.jsonld --output-format application/n-triples > grep-all.nt

      - name: Wake up Oxigraph (Wait for 200 OK)
        run: |
          echo "Vekker Oxigraph på ${{ secrets.OXIGRAPH_URL }}..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.OXIGRAPH_URL }} || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "Oxigraph er våken!"
              exit 0
            fi
            echo "Venter på at serveren skal starte... (Forsøk $i/30)"
            sleep 10
          done
          echo "Serveren startet ikke i tide."
          exit 1

      - name: Wipe and Load Cloud Data
        run: |
          # 1. Tøm databasen
          curl -X POST "${{ secrets.OXIGRAPH_URL }}/update" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/sparql-update" \
            --data "CLEAR DEFAULT"

          # 2. Last inn ny data (.nt format er superraskt)
          curl -X POST "${{ secrets.OXIGRAPH_URL }}/store" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/n-triples" \
            --data-binary @grep-all.nt
