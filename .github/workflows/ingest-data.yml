name: Ingest Grep Data (Real-time Flow)

on:
  schedule:
    - cron: '0 21 * * *' # Hver natt kl 22:00 (Norsk tid / CET)
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download, Process and Ingest
        run: |
          # 1. Klargjør variabler
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          
          # 2. Hent siste endrings-id fra Udir
          LATEST_ID=$(curl -s "https://data.udir.no/kl06/v201906/endringer?antall=1" | grep -oE '"endrings-id":\s*"[^"]+"' | head -n 1 | cut -d'"' -f4)
          echo "Siste endrings-id fra Udir: $LATEST_ID"

          # 3. Sjekk hva vi har lagret i Oxigraph (Metadata-triple)
          # Vi bruker SPARQL direkte mot Oxigraph
          STORED_ID=$(curl -s -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
               -H "Content-Type: application/sparql-query" \
               -H "Accept: application/sparql-results+json" \
               --data "SELECT ?id WHERE { <https://grep.udir.no/meta> <https://grep.udir.no/schema/last-id> ?id }" \
               "$URL/query" | grep -oE '"value":\s*"[^"]+"' | head -n 1 | cut -d'"' -f4 || echo "ingenting")
          echo "Lagret ID i Oxigraph: $STORED_ID"

          # 4. Sammenlign (hopp over hvis like, med mindre det er manuell start)
      - name: The Ultimate Ingest (Streaming JSON-LD, No Java)
        shell: bash
        run: |
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          
          # 1. Vekker Oxigraph (Viktig)
          echo "Vekker Oxigraph..."
          for i in {1..20}; do
            if curl -s -o /dev/null -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" --fail "$URL"; then
              break
            fi
            sleep 5
          done

          # 2. Tømmer databasen (Wipe)
          echo "Tømmer databasen..."
          curl -s -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" -X DELETE "$URL/store?default" || true
          
          # 3. Laster ned og pakker ut
          echo "Henter data..."
          mkdir -p temp_data/extracted
          curl -sL https://data.udir.no/kl06/v201906/dump/jsonld -o temp_data/data.zip
          unzip -q temp_data/data.zip -d temp_data/extracted
          
          # 4. SUPER-STREAMING (The Secret Sauce)
          # Vi bruker Python til å generere en gyldig JSON-liste av alle filene og piper den til curl
          echo "Starter bulk-opplasting av 46k+ filer via streaming..."
          python3 -c "
          import os, sys
          files = [os.path.join(dp, f) for dp, dn, filenames in os.walk('temp_data/extracted') for f in filenames if f.endswith('.jsonld')]
          sys.stdout.write('[')
          for i, f_path in enumerate(files):
              if i > 0: sys.stdout.write(',')
              with open(f_path, 'r') as f:
                  sys.stdout.write(f.read())
          sys.stdout.write(']')
          " | curl -f -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
               -X POST \
               -H "Content-Type: application/ld+json" \
               --data-binary @- \
               "$URL/store?default"
          
          echo "Ferdig! Oxigraph er nå oppdatert."
