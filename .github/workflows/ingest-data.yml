name: Ingest data to Oxigraph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Test Data
        run: |
          echo "Lager testdata..."
          cat <<EOF > grep-all.nt
          <https://data.udir.no/kl06/test-1> <http://www.w3.org/2000/01/rdf-schema#label> "Test 1" .
          <https://data.udir.no/kl06/test-2> <http://www.w3.org/2000/01/rdf-schema#label> "Test 2" .
          EOF

      - name: Wake up Oxigraph
        run: |
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" == "200" ]; then exit 0; fi
            sleep 5
          done

      - name: Wipe and Load Cloud Data
        run: |
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          
          # Vi bruker nå den mest eksplisitte metoden: /store?default
          echo "Dytter data til $URL/store?default ..."
          curl -f -X POST "$URL/store?default" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/n-triples" \
            --data-binary @grep-all.nt

      - name: Verify Data Immediately
        run: |
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          echo "Sjekker antall tripler rett etter opplasting..."
          curl -f -X POST "$URL/query" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/sparql-query" \
            -H "Accept: application/sparql-results+json" \
            --data "SELECT (COUNT(*) as ?c) WHERE { ?s ?p ?o }"
