name: Ingest Grep Data (Real-time Flow)

on:
  schedule:
    - cron: '0 21 * * *' # Hver natt kl 22:00 (Norsk tid / CET)
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download, Process and Ingest
        run: |
          # 1. Klargjør variabler
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          
          # 2. Hent siste endrings-id fra Udir
          LATEST_ID=$(curl -s "https://data.udir.no/kl06/v201906/endringer?antall=1" | grep -oE '"endrings-id":\s*"[^"]+"' | head -n 1 | cut -d'"' -f4)
          echo "Siste endrings-id fra Udir: $LATEST_ID"

          # 3. Sjekk hva vi har lagret i Oxigraph (Metadata-triple)
          # Vi bruker SPARQL direkte mot Oxigraph
          STORED_ID=$(curl -s -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
               -H "Content-Type: application/sparql-query" \
               -H "Accept: application/sparql-results+json" \
               --data "SELECT ?id WHERE { <https://grep.udir.no/meta> <https://grep.udir.no/schema/last-id> ?id }" \
               "$URL/query" | grep -oE '"value":\s*"[^"]+"' | head -n 1 | cut -d'"' -f4 || echo "ingenting")
          echo "Lagret ID i Oxigraph: $STORED_ID"

          # 4. Sammenlign (hopp over hvis like, med mindre det er manuell start)
      - name: Download, Process and Ingest (Super-fast PowerShell)
        shell: pwsh
        run: |
          $url = "${{ secrets.OXIGRAPH_URL }}".TrimEnd('/')
          $user = "${{ secrets.OXIGRAPH_USER }}"
          $pass = "${{ secrets.OXIGRAPH_PASSWORD }}"
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${user}:${pass}"))
          $headers = @{ "Authorization" = "Basic $auth" }
          
          # 1. Garantert Wake-up
          Write-Host "Venter på at Oxigraph skal bli klar ved $url..."
          $ready = $false
          for ($i=1; $i -le 20; $i++) {
              try {
                  $check = Invoke-WebRequest -Uri "$url/query" -Method Post -Body "SELECT * WHERE { ?s ?p ?o } LIMIT 1" -Headers (@{ "Content-Type" = "application/sparql-query" } + $headers) -ErrorAction Stop
                  if ($check.StatusCode -eq 200) { $ready = $true; break }
              } catch {
                  Write-Host "Venter... (forsøk $i/20)"
                  Start-Sleep -Seconds 5
              }
          }
          if (!$ready) { throw "Oxigraph ble ikke klar i tide." }
          
          # 2. Hent ID-er
          $udirResponse = Invoke-RestMethod -Uri "https://data.udir.no/kl06/v201906/endringer?antall=1"
          $latestId = $udirResponse."endrings-id"
          
          # 3. Tøm (Valgfritt, men trygt)
          Write-Host "Tømmer databasen..."
          try { Invoke-WebRequest -Uri "$url/store?default" -Method Delete -Headers $headers -ErrorAction SilentlyContinue } catch {}
          
          # 4. Last ned og pakk ut
          if (!(Test-Path "temp_data")) { New-Item -ItemType Directory -Path "temp_data" }
          Invoke-WebRequest -Uri "https://data.udir.no/kl06/v201906/dump/jsonld" -OutFile "temp_data/data.zip"
          Expand-Archive -Path "temp_data/data.zip" -DestinationPath "temp_data/extracted" -Force
          
          # 5. Parallell opplasting med RETRY
          $files = Get-ChildItem "temp_data/extracted/*.jsonld" -Recurse
          Write-Host "Laster opp $($files.Count) filer med retry-logikk..."
          
          $files | ForEach-Object -Parallel {
              $headers = $using:headers
              $headers["Content-Type"] = "application/ld+json"
              $postUrl = "$($using:url)/store?default"
              $fileContent = [System.IO.File]::ReadAllBytes($_.FullName)
              
              $success = $false
              for ($attempt=1; $attempt -le 3; $attempt++) {
                  try {
                      Invoke-WebRequest -Uri $postUrl -Method Post -Body $fileContent -Headers $headers -ErrorAction Stop
                      $success = $true
                      break
                  } catch {
                      Write-Warning "Forsøk $attempt feilet for $($_.Name): $($_.Exception.Message)"
                      Start-Sleep -Seconds ($attempt * 2)
                  }
              }
              if (!$success) { Write-Error "Kunne ikke laste opp $($_.Name) etter 3 forsøk." }
          } -ThrottleLimit 8
          
          # 6. Metadata
          $meta = "<https://grep.udir.no/meta> <https://grep.udir.no/schema/last-id> `"$latestId`" ."
          $headers["Content-Type"] = "application/n-triples"
          Invoke-WebRequest -Uri "$url/store?default" -Method Post -Body $meta -Headers $headers
          
          Write-Host "Fullført! Oppdatert til ID: $latestId"
