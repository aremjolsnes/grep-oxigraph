name: Ingest data to Oxigraph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Grep data
        run: |
          # Vi henter nå en fil som vi er helt sikre på at eksisterer
          echo "Laster ned Grep-data..."
          curl -f -L -o grep-all.nt https://raw.githubusercontent.com/stemmen/grep-rdf/main/grep.nt
          
          # Sjekk om fila faktisk inneholder noe
          ls -lh grep-all.nt
          if [ ! -s grep-all.nt ]; then
            echo "FEIL: Fila er tom eller ble ikke lastet ned!"
            exit 1
          fi

      - name: Wake up Oxigraph (Wait for 200 OK)
        run: |
          # Vi fjerner eventuell trailing slash fra URL-en for sikkerhets skyld
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          echo "Vekker Oxigraph på $URL..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "Oxigraph er våken!"
              exit 0
            fi
            echo "Venter på at serveren skal starte... (Status: $STATUS, Forsøk $i/30)"
            sleep 10
          done
          echo "Serveren startet ikke i tide."
          exit 1

      - name: Wipe and Load Cloud Data
        run: |
          URL=$(echo "${{ secrets.OXIGRAPH_URL }}" | sed 's/\/$//')
          echo "Sender data til $URL/store..."
          
          # 1. Tøm databasen først
          curl -f -X POST "$URL/update" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/sparql-update" \
            --data "CLEAR DEFAULT"

          # 2. Last inn ny data (vi bruker -v for å se hva som skjer)
          curl -f -v -X POST "$URL/store" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/n-triples" \
            --data-binary @grep-all.nt
