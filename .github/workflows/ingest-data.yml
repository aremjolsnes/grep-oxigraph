name: Ingest data to Oxigraph

on:
  schedule:
    - cron: '0 0 * * *' # Hver natt kl 00:00
  workflow_dispatch: # Gir deg den grå knappen for å kjøre manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Apache Jena (RIOT)
        run: |
          sudo apt-get update
          sudo apt-get install -y jena-repo-tools

      - name: Download Grep data
        run: |
          curl -L -o grep-data.zip https://data.udir.no/kl06/v201906/grep-data.zip
          unzip grep-data.zip -d grep-temp

      - name: Convert to N-Triples (with RIOT)
        run: |
          # Vi konverterer alle JSON-LD filene til én stor N-Triples fil for rask opplasting
          find grep-temp -name "*.jsonld" | xargs riot --output=ntriples > grep-all.nt

      - name: Wake up Oxigraph (Wait for 200 OK)
        run: |
          echo "Vekker Oxigraph på ${{ secrets.OXIGRAPH_URL }}..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.OXIGRAPH_URL }} || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "Oxigraph er våken!"
              exit 0
            fi
            echo "Venter på at serveren skal starte... (Forsøk $i/30)"
            sleep 10
          done
          echo "Serveren startet ikke i tide."
          exit 1

      - name: Wipe and Load Cloud Data
        run: |
          # 1. Tøm databasen (Wipe)
          curl -X POST "${{ secrets.OXIGRAPH_URL }}/update" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/sparql-update" \
            --data "CLEAR DEFAULT"

          # 2. Last inn ny data (Load)
          curl -X POST "${{ secrets.OXIGRAPH_URL }}/store" \
            -u "${{ secrets.OXIGRAPH_USER }}:${{ secrets.OXIGRAPH_PASSWORD }}" \
            -H "Content-Type: application/n-triples" \
            --data-binary @grep-all.nt
