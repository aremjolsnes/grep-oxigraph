name: Deploy Oxigraph to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/grep-oxigraph:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare Container App Manifest
        run: |
          # Vi erstatter OWNER_PLACEHOLDER med ditt faktiske brukernavn (bruker | som skilletegn for sikkerhets skyld)
          sed -i "s|OWNER_PLACEHOLDER|${{ github.repository_owner }}|g" containerapp.yaml

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: rg-grep-prod
          containerAppName: grep-oxigraph
          containerAppEnvironment: env-grep-prod
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/grep-oxigraph:latest
          yamlConfigPath: containerapp.yaml
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}

