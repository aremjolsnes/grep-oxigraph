name: Deploy Oxigraph to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/grep-oxigraph:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          # Vi bruker Azure CLI direkte for best kontroll
          az containerapp up \
            --name grep-oxigraph \
            --resource-group rg-grep-prod \
            --image ghcr.io/${{ github.repository_owner }}/grep-oxigraph:latest \
            --cpu 0.25 --memory 0.5Gi \
            --ingress external --target-port 7878 \
            --scale-rule-type http --min-replicas 0 --max-replicas 1
