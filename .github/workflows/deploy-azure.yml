name: Deploy Oxigraph to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/grep-oxigraph:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          # 1. Sikre at Managed Environment finnes
          az containerapp env create --name env-grep-prod --resource-group rg-grep-prod --location northeurope

          # 2. Hent lagringsnøkkelen
          STORAGE_KEY=$(az storage account keys list --resource-group rg-grep-prod --account-name grepoxiamj123 --query "[0].value" --output tsv)

          # 3. Definer lagringen i Environment-et (her var feilen i flagg-navnene)
          az containerapp env storage set \
            --name env-grep-prod \
            --resource-group rg-grep-prod \
            --storage-name oxigraph-storage \
            --azure-file-account-name grepoxiamj123 \
            --azure-file-share-name oxigraph-data \
            --azure-file-account-key $STORAGE_KEY \
            --access-mode ReadWrite

          # 4. Opprett eller oppdater selve Container Appen med montert disk
          az containerapp create \
            --name grep-oxigraph \
            --resource-group rg-grep-prod \
            --environment env-grep-prod \
            --image ghcr.io/${{ github.repository_owner }}/grep-oxigraph:latest \
            --cpu 0.25 --memory 0.5Gi \
            --ingress external --target-port 7878 \
            --min-replicas 0 --max-replicas 1 \
            --volume-name data-volume \
            --volume-mount-path /data \
            --storage-name oxigraph-storage
