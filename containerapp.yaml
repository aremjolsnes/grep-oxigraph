# Oxigraph deployment manifest for Azure Container Apps
# Oppdatert etter "undo"-uhell for å sikre stabil drift og bildehenting.
properties:
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 7878
      allowInsecure: false
      transport: http
  template:
    containers:
      - image: ghcr.io/OWNER_PLACEHOLDER/grep-oxigraph:latest
        name: grep-oxigraph
        resources:
          cpu: 1.0
          memory: 2.0Gi
        volumeMounts:
          - mountPath: /data
            volumeName: data-volume
        env:
          - name: RUST_LOG
            value: debug
        probes:
          - type: Liveness
            httpGet:
              path: /
              port: 7878
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          - type: Readiness
            httpGet:
              path: /
              port: 7878
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
    scale:
      minReplicas: 1
      maxReplicas: 1

    volumes:
      - name: data-volume
        storageType: EmptyDir

