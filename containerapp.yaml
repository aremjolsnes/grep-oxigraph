properties:
  configuration:
    ingress:
      external: true
      targetPort: 7878
  template:
    containers:
      - image: ghcr.io/OWNER_PLACEHOLDER/grep-oxigraph:latest
        name: grep-oxigraph
        resources:
          cpu: 0.5
          memory: 1.0Gi
        volumeMounts:
          - mountPath: /data
            volumeName: data-volume
        probes:
          - type: Liveness
            httpGet:
              path: /
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 30
          - type: Readiness
            httpGet:
              path: /
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 30
    scale:
      minReplicas: 0
      maxReplicas: 1
    volumes:
      - name: data-volume
        storageName: oxigraph-storage
        storageType: AzureFile
